<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Nexora | Strategy & Product Hub Lahore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-gradient: linear-gradient(145deg, #f5f8fc 0%, #eef3fa 100%);
            --primary: #1e4663;
            --primary-light: #2a5f85;
            --accent: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 10px 25px rgba(30, 70, 99, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            --border-color: #e2e8f0;
        }
        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            padding: 1.5rem 1rem;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.5;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0f172a, #1e4663);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }
        .header p {
            color: var(--text-muted);
            margin-top: 0.25rem;
            font-size: 1rem;
            font-weight: 500;
        }
        
        /* Dashboard Stats Panel */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.25rem;
            box-shadow: var(--card-shadow);
            border: 1px solid white;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .stat-icon.total { background: #eff6ff; color: #2563eb; }
        .stat-icon.consulting { background: #fdf4ff; color: #c084fc; }
        .stat-icon.product { background: #ecfdf5; color: #10b981; }
        .stat-val { font-size: 1.5rem; font-weight: 700; color: #0f172a; line-height: 1.2; }
        .stat-lbl { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.6rem 1.2 lrem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .tab-btn:hover { color: var(--primary); background: rgba(30,70,99,0.04); }
        .tab-btn.active { background: var(--primary); color: white; padding: 0.6rem 1.2rem; }
        
        .tab-pane { display: none; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-pane.active-pane { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .form-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 768px) {
            .form-grid { grid-template-columns: 2fr 1fr 1fr 2fr; }
            .full-width-field { grid-column: span 4; }
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1.5px solid var(--border-color);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-main);
            background: #f8fafc;
            transition: all 0.2s ease;
        }
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary-light);
            background: white;
            box-shadow: 0 0 0 4px rgba(42,95,133,0.1);
        }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .btn {
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-secondary { background: #f1f5f9; color: #334155; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-danger:hover { background: #fca5a5; }
        .btn-sm { padding: 0.45rem 1rem; font-size: 0.75rem; border-radius: 10px; }

        /* Controls Block */
        .filter-controls {
            background: white;
            padding: 1rem;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .filter-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .pill-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .pill-btn.active { background: #e2e8f0; color: var(--primary); box-shadow: inset 0 2px 4px rgba(0,0,0,0.04); }
        
        .search-box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1.5px solid var(--border-color);
        }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.9rem; color: var(--text-main); }
        
        @media (min-width: 640px) {
            .filter-controls { flex-direction: row; justify-content: space-between; align-items: center; }
            .search-box { width: 300px; }
        }

        /* Grid Layout */
        .companies-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        @media (min-width: 640px) { .companies-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); } }
        
        .company-card {
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(241,245,249,0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .company-card:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(30,70,99,0.08); }
        .card-content { padding: 1.5rem; }
        
        .card-meta-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .company-name { font-size: 1.25rem; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; line-height: 1.3; }
        
        .rank-badge { font-size: 0.7rem; font-weight: 700; color: var(--primary-light); background: #f0f7fc; padding: 0.2rem 0.5rem; border-radius: 8px; margin-bottom: 0.4rem; display: inline-block; }
        .location-tag { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 4px; }
        
        .type-badge {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        .badge-product { background: #ecfdf5; color: #10b981; border: 1px solid #d1fae5; }
        
        .company-desc { color: #475569; font-size: 0.85rem; line-height: 1.5; margin: 0.75rem 0 1.25rem; }
        
        .company-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0f7fc;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--primary-light);
            transition: all 0.2s ease;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 1rem 1.5rem;
            border-top: 1px solid #f1f5f9;
            background: #fafafa;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }
        .empty-state { text-align: center; padding: 4rem 2rem; background: white; border-radius: 24px; color: var(--text-muted); box-shadow: var(--card-shadow); }
        .empty-state i { font-size: 2.5rem; margin-bottom: 1rem; color: #cbd5e1; }
        
        footer { margin-top: 3rem; text-align: center; font-size: 0.75rem; color: var(--text-muted); padding-bottom: 1rem; }
    </style>
</head>

                <div class="input-group">

                    <input type="url" id="compUrl" placeholder="https://...">

                <div class="input-group full-width-field">

                </div>
            </div>
            <div class="btn-group">

        </div>

        <div class="filter-controls">

                <button class="pill-btn" data-filter="Consulting">Consulting Matrix</button>
                <button class="pill-btn" data-filter="Product">Product Elite</button>
            </div>
            <div class="search-box">

                <i class="fas fa-circle-xmark" id="clearCompanySearch" style="cursor:pointer; color: var(--text-muted);"></i>
            </div>
        </div>

        <div id="companiesListContainer" class="companies-grid">

    </div>

    <div id="opportunityTab" class="tab-pane">

            </div>

    </div>

    <footer>

</div>

        { id: 31, rank: 11, name: "Conrad Labs", type: "Product", location: "Model Town Link Rd", description: "Bespoke US venture-backed SaaS development refinery focusing explicitly on incubating early MVP code frameworks and refining complex software architectures.", url: "https://www.conradlabs.com/careers/" },
        { id: 32, rank: 12, name: "Emumba", type: "Product", location: "DHA Phase 5", description: "High-performance fintech data visualization engineers scaling real-time algorithmic equity panels and heavy capital-market calculation interfaces.", url: "https://www.emumba.com/careers/" },
        { id: 33, rank: 13, name: "TenPearls", type: "Product", location: "Gulberg III", description: "Global agile tech infrastructure scaling complex healthcare diagnostic patient portals, customized cloud platforms, and mobile consumer services.", url: "https://tenpearls.com/careers/" },
        { id: 34, rank: 14, name: "Retailo Technologies", type: "Product", location: "Gulberg II", description: "B2B inventory orchestration and supply-chain fintech logic systems managing localized product distribution analytics and small-merchant credit software.", url: "https://retailo.co/careers/" },
        { id: 35, rank: 15, name: "Nisum Pakistan", type: "Product", location: "Gulberg III", description: "Global systems firm managing enterprise-level multichannel merchant checkout tech systems, continuous pipeline checking frameworks, and large inventory tools.", url: "https://nisum.com/careers" },
        { id: 36, rank: 16, name: "TkXel", type: "Product", location: "DHA Phase 3", description: "Enterprise SaaS architecture development suite engineering automated financial processing blocks and integrated business intelligence systems.", url: "https://tkxel.com/careers/" },
        { id: 37, rank: 17, name: "Rolustech", type: "Product", location: "Gulberg", description: "Proprietary specialized vertical-specific CRM plugins and modular cloud application networks running customized pipeline orchestration code.", url: "https://www.rolustech.com/careers" },
        { id: 38, rank: 18, name: "Strategic Systems International", type: "Product", location: "Gulberg", description: "Heavy industrial mathematical analytics tools, risk evaluation models, and financial optimization SaaS designed for external enterprise actors.", url: "https://ssi.com.pk/careers/" },
        { id: 39, rank: 19, name: "Nextbridge", type: "Product", location: "Canal Bank Rd", description: "Large-scale e-commerce transactional database frameworks, custom multi-tenant tracking platforms, and enterprise supply architectures.", url: "https://nextbridge.com/careers/" },
        { id: 40, rank: 20, name: "Genetech Solutions", type: "Product", location: "Gulberg", description: "Targeted digital workflow automation products, customized specialized content engines, and functional web3 interface widgets.", url: "https://genetechsolutions.com/careers" }
    ];

    let companies = [];
    let editModeId = null;
    let activeFilter = "all";
    let companySearchQuery = "";
    let oppSearchQuery = "";

    // DOM Elements Mapping
    const compNameInput = document.getElementById('compName');
    const compTypeInput = document.getElementById('compType');
    const compLocationInput = document.getElementById('compLocation');
    const compUrlInput = document.getElementById('compUrl');
    const compDescInput = document.getElementById('compDesc');
    const saveBtn = document.getElementById('saveCompanyBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const companiesContainer = document.getElementById('companiesListContainer');
    const opportunityContainer = document.getElementById('opportunityListContainer');
    const searchCompaniesInput = document.getElementById('searchCompaniesInput');
    const searchOppInput = document.getElementById('searchOppInput');
    const formTitleSpan = document.getElementById('formTitleText');
    const formIcon = document.getElementById('formIcon');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function saveToLocal() {
        localStorage.setItem('nexora_lahore_v3_matrix', JSON.stringify(companies));
        calculateMetrics();
    }

    function calculateMetrics() {
        document.getElementById('metricTotal').innerText = companies.length;
        document.getElementById('metricConsulting').innerText = companies.filter(c => c.type === 'Consulting').length;
        document.getElementById('metricProduct').innerText = companies.filter(c => c.type === 'Product').length;
    }

    function loadData() {
        const stored = localStorage.getItem('nexora_lahore_v3_matrix');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                companies = Array.isArray(parsed) && parsed.length > 0 ? parsed : [...SEED_COMPANIES];
            } catch(e) { companies = [...SEED_COMPANIES]; }
        } else {
            companies = [...SEED_COMPANIES];
        }
        saveToLocal();
        renderBothTabs();
    }

    function getFilteredCompanies(searchQuery) {
        return companies.filter(c => {
            const matchesFilter = activeFilter === "all" || c.type === activeFilter;
            const cleanQuery = searchQuery.trim().toLowerCase();
            const matchesSearch = !cleanQuery || 
                c.name.toLowerCase().includes(cleanQuery) || 
                (c.description && c.description.toLowerCase().includes(cleanQuery)) ||
                (c.location && c.location.toLowerCase().includes(cleanQuery)) ||
                c.type.toLowerCase().includes(cleanQuery);
            return matchesFilter && matchesSearch;
        });
    }

    function renderCompaniesTab() {
        const filtered = getFilteredCompanies(companySearchQuery);
        if (filtered.length === 0) {
            companiesContainer.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i> No corporate structures mapped to current query parameters.</div>`;
            return;
        }
        let html = '';
        filtered.forEach(comp => {
            let safeUrl = comp.url?.trim() || '';
            if (safeUrl && !safeUrl.startsWith('http')) safeUrl = 'https://' + safeUrl;
            const rankLabel = comp.rank ? `<span class="rank-badge"><i class="fas fa-arrow-up-wide-short"></i> Dynamic Rank: #${comp.rank}</span>` : '';
            const locationLabel = comp.location ? `<div class="location-tag"><i class="fas fa-location-dot"></i> ${escapeHtml(comp.location)}</div>` : '<div class="location-tag"><i class="fas fa-location-dot"></i> Lahore Office Hub</div>';
            
            html += `
                <div class="company-card" data-id="${comp.id}">
                    <div class="card-content">
                        <div class="card-meta-row">
                            <div>
                                ${rankLabel}
                                <div class="company-name">${escapeHtml(comp.name)}</div>
                            </div>
                            <span class="type-badge badge-${comp.type.toLowerCase()}">${comp.type}</span>
                        </div>
                        ${locationLabel}
                        <div class="company-desc">${escapeHtml(comp.description || 'No specific asset parameters cataloged.')}</div>
                        <div>
                            ${safeUrl ? `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="company-link"><i class="fas fa-arrow-up-right-from-square"></i> Careers Link</a>` : '<span class="company-link" style="background:#f1f5f9; color:#94a3b8;"><i class="fas fa-link-slash"></i> Null Route</span>'}
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-secondary btn-sm edit-company-btn" data-id="${comp.id}"><i class="fas fa-pen-to-square"></i> Mod</button>
                        <button class="btn btn-danger btn-sm delete-company-btn" data-id="${comp.id}"><i class="fas fa-trash-can"></i> Purge</button>
                    </div>
                </div>
            `;
        });
        companiesContainer.innerHTML = html;
        
        document.querySelectorAll('.edit-company-btn').forEach(btn => {
            btn.addEventListener('click', () => startEditMode(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.delete-company-btn').forEach(btn => {
            btn.addEventListener('click', () => deleteCompany(parseInt(btn.dataset.id)));
        });
    }

    function renderOpportunityTab() {
        const filtered = getFilteredCompanies(oppSearchQuery);
        if (filtered.length === 0) {
            opportunityContainer.innerHTML = `<div class="empty-state"><i class="fas fa-eye-slash"></i> Surveillance array reporting zero hits.</div>`;
            return;
        }
        let html = '';
        filtered.forEach(comp => {
            let safeUrl = comp.url?.trim() || '';
            if (safeUrl && !safeUrl.startsWith('http')) safeUrl = 'https://' + safeUrl;
            const locationLabel = comp.location ? `<div class="location-tag" style="color:rgba(255,255,255,0.7);"><i class="fas fa-location-dot"></i> ${escapeHtml(comp.location)}</div>` : '';
            html += `
                <div class="company-card" style="background: linear-gradient(135deg, #1e4663 0%, #112d42 100%); color: white; border: none;">
                    <div class="card-content">
                        <div class="card-meta-row">
                            <div class="company-name" style="color: white;">${escapeHtml(comp.name)}</div>
                            <span class="type-badge" style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);">${comp.type}</span>
                        </div>
                        ${locationLabel}
                        <div class="company-desc" style="color: #e2e8f0;">${escapeHtml(comp.description)}</div>
                        <div style="margin-top: 1rem;">
                            ${safeUrl ? `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="company-link" style="background: white; color: #1e4663;"><i class="fas fa-bolt"></i> Access Careers Platform</a>` : '<span class="company-link" style="background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.4);"><i class="fas fa-ban"></i> Blocked Trace</span>'}
                        </div>
                    </div>
                </div>
            `;
        });
        opportunityContainer.innerHTML = html;
    }

    function renderBothTabs() {
        renderCompaniesTab();
        renderOpportunityTab();
    }

    function onSave() {
        const name = compNameInput.value.trim();
        const type = compTypeInput.value;
        const location = compLocationInput.value.trim();
        const desc = compDescInput.value.trim();
        let url = compUrlInput.value.trim();

        if (!name || !url) { alert("Core fields missing: Corporate target identity tracking needs Name & URL."); return; }
        if (!url.startsWith('http')) url = 'https://' + url;

        if (editModeId !== null) {
            const idx = companies.findIndex(c => c.id === editModeId);
            if (idx !== -1) {
                companies[idx] = { ...companies[idx], name, type, location, description: desc, url };
            }
            exitEditMode();
        } else {
            companies.push({ id: Date.now(), rank: null, name, type, location, description: desc, url });
            clearFormFields();
        }
        saveToLocal();
        renderBothTabs();
    }

    function deleteCompany(id) {
        if (confirm("Execute irreversible deletion mapping parameters for this enterprise entity?")) {
            companies = companies.filter(c => c.id !== id);
            if (editModeId === id) exitEditMode();
            saveToLocal();
            renderBothTabs();
        }
    }

    function startEditMode(id) {
        const comp = companies.find(c => c.id === id);
        if (!comp) return;
        editModeId = id;
        compNameInput.value = comp.name;
        compTypeInput.value = comp.type;
        compLocationInput.value = comp.location || '';
        compUrlInput.value = comp.url;
        compDescInput.value = comp.description || '';
        formTitleSpan.innerText = 'Modify Operational Asset Metrics';
        formIcon.className = 'fas fa-pen-to-square';
        cancelEditBtn.style.display = 'inline-flex';
        saveBtn.innerHTML = '<i class="fas fa-pen"></i> Commit Alteration';
        document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function exitEditMode() {
        editModeId = null;
        clearFormFields();
        formTitleSpan.innerText = 'Inject New Corporate Asset';
        formIcon.className = 'fas fa-circle-plus';
        cancelEditBtn.style.display = 'none';
        saveBtn.innerHTML = '<i class="fas fa-floppy-disk"></i> Commit Strategy';
    }

    function clearFormFields() { compNameInput.value = ''; compLocationInput.value = ''; compUrlInput.value = ''; compDescInput.value = ''; }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
        document.getElementById(tabId + 'Tab').classList.add('active-pane');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        if (tabId === 'opportunity') renderOpportunityTab(); else renderCompaniesTab();
    }

    // System Event Setup
    saveBtn.addEventListener('click', onSave);
    clearFormBtn.addEventListener('click', () => editModeId !== null ? exitEditMode() : clearFormFields());
    cancelEditBtn.addEventListener('click', exitEditMode);
    
    searchCompaniesInput.addEventListener('input', (e) => { companySearchQuery = e.target.value; renderCompaniesTab(); });
    document.getElementById('clearCompanySearch').addEventListener('click', () => { searchCompaniesInput.value = ''; companySearchQuery = ''; renderCompaniesTab(); });
    
    searchOppInput.addEventListener('input', (e) => { oppSearchQuery = e.target.value; renderOpportunityTab(); });
    document.getElementById('clearOppSearch').addEventListener('click', () => { searchOppInput.value = ''; oppSearchQuery = ''; renderOpportunityTab(); });

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
    });

    document.getElementById('filterPillsContainer').querySelectorAll('.pill-btn').forEach(pill => {
        pill.addEventListener('click', (e) => {
            document.getElementById('filterPillsContainer').querySelectorAll('.pill-btn').forEach(p => p.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.filter;
            renderCompaniesTab();
        });
    });

    // Booting System Data Frame
    loadData();
</script>
</body>
</html>
