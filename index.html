<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Farid OppoTrack | Elite Strategy Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-main: #070a13;
            --panel-glass: rgba(13, 18, 33, 0.75);
            --card-glass: rgba(22, 32, 54, 0.45);
            --border-glass: rgba(255, 255, 255, 0.05);
            --primary: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --nav-height: 70px;
        }
        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(14, 165, 233, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(124, 58, 237, 0.04) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden; /* Prevents body bounce, shifts scroll to tabs */
        }
        
        /* App Window Frame Layout */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* Fixed Top Global Header */
        .app-header {
            padding: 1.5rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            background: rgba(7, 10, 19, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        .brand h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .brand h1 span { color: var(--primary); }
        .brand p { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Top Action Buttons */
        .btn-action {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-action:hover {
            background: var(--primary);
            color: #000;
        }

        /* Scrollable Dynamic Workspace Viewports */
        .view-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.25rem calc(var(--nav-height) + 1.5rem);
            display: none;
        }
        .view-container.active {
            display: block;
        }

        /* Grid Frameworks */
        .grid-two-column {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        @media (min-width: 640px) {
            .grid-two-column { grid-template-columns: repeat(2, 1fr); }
        }

        .grid-one-column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Core Card Architectural Components */
        .matrix-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 1.25rem;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .matrix-card.interactive {
            cursor: pointer;
        }
        .matrix-card.interactive:hover {
            border-color: rgba(56, 189, 248, 0.25);
            background: rgba(30, 41, 59, 0.5);
            transform: translateY(-2px);
        }

        /* Card Text Mechanics */
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; gap: 10px; }
        .card-title { font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.3; }
        .card-meta { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.75rem; }
        .card-desc { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Badges */
        .badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; padding: 0.25rem 0.5rem; border-radius: 6px; letter-spacing: 0.5px; white-space: nowrap; }
        .badge-rank { color: var(--accent-gold); background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.15); }
        .badge-consulting { color: #e28743; background: rgba(226, 135, 67, 0.1); border: 1px solid rgba(226, 135, 67, 0.15); }
        .badge-product { color: var(--success); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.15); }

        /* External URL Deployments */
        .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .link-anchor {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glass);
            padding: 0.45rem 0.85rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .link-anchor:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .link-anchor.lnk-web { color: var(--primary); }
        .link-anchor.lnk-linkedin { color: #60a5fa; }

        /* Institutional List Row Styles */
        .inst-list-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: background 0.2s ease;
        }
        .inst-list-item:hover { background: rgba(255,255,255,0.02); }
        .inst-details h4 { font-size: 0.95rem; font-weight: 600; color: #fff; }
        .inst-details p { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .inst-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1rem; }

        /* Structural Overlay Dialog Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #0d1221;
            border: 1px solid var(--border-glass);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: modalShow 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes modalShow { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.15rem; font-weight: 700; color: #fff; }
        .close-modal-trigger { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
        .close-modal-trigger:hover { color: #fff; }

        .modal-body { padding: 1.5rem; max-height: 70vh; overflow-y: auto; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 0.5rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid var(--border-glass); font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #fff; background: rgba(7, 10, 19, 0.5); outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border-glass); display: flex; gap: 10px; justify-content: flex-end; background: rgba(7, 10, 19, 0.3); }
        .btn-ui { padding: 0.6rem 1.2rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-ui-primary { background: var(--primary); color: #000; }
        .btn-ui-secondary { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .btn-ui-danger { background: rgba(239,68,68,0.15); color: #f87171; }

        /* Fixed Bottom Ribbon Navigation Menu */
        .bottom-ribbon {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: var(--nav-height);
            background: rgba(13, 18, 33, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-glass);
            z-index: 90;
        }
        .nav-inner {
            max-width: 600px; margin: 0 auto; height: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 1rem;
        }
        .nav-item {
            background: transparent; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; width: 64px; height: 100%; font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 500; gap: 4px; transition: color 0.2s ease;
        }
        .nav-item i { font-size: 1.2rem; transition: transform 0.2s ease; }
        .nav-item:hover { color: var(--text-main); }
        .nav-item.active { color: var(--primary); font-weight: 600; }
        .nav-item.active i { transform: translateY(-2px); }

        /* Search Infrastructure */
        .search-block { margin-bottom: 1.2rem; display: flex; background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 12px; padding: 0.6rem 1rem; align-items: center; gap: 10px; }
        .search-block input { flex: 1; border: none; background: transparent; outline: none; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.85rem; }

        .empty-view-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 0.9rem; }
        .empty-view-state i { font-size: 2rem; margin-bottom: 1rem; opacity: 0.3; display: block; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- Static Header -->
    <header class="app-header">
        <div class="brand">
            <h1>Farid <span>OppoTrack</span></h1>
            <p id="viewSubtitle">Operational Control Hub</p>
        </div>
        <div class="header-actions" id="headerActionZone">
            <button class="btn-action" id="openAddModalBtn"><i class="fas fa-plus"></i> Add Asset</button>
        </div>
    </header>

    <!-- TAB 1: HOME (READ/WRITE WORKSPACE) -->
    <main id="viewHome" class="view-container active">
        <div class="search-block">
            <i class="fas fa-magnifying-glass" style="color: var(--text-muted);"></i>
            <input type="text" id="homeSearchInput" placeholder="Filter current portfolio entries...">
        </div>
        <div class="grid-two-column" id="homeGridContainer">
            <!-- Programmatically Injected -->
        </div>
    </main>

    <!-- TAB 2: INSTITUTIONAL TRACKS (READ ONLY) -->
    <section id="viewInstitutional" class="view-container">
        <div class="grid-one-column" id="institutionalContainer">
            <!-- Programmatically Injected -->
        </div>
    </section>

    <!-- TAB 3: CONSULTING METRICS (READ ONLY) -->
    <section id="viewConsulting" class="view-container">
        <div class="grid-two-column" id="consultingGridContainer">
            <!-- Programmatically Injected -->
        </div>
    </section>

    <!-- TAB 4: PRODUCT-BASED SAAS (READ ONLY) -->
    <section id="viewProduct" class="view-container">
        <div class="grid-two-column" id="productGridContainer">
            <!-- Programmatically Injected -->
        </div>
    </section>

    <!-- Dynamic Bottom Ribbon Menu -->
    <nav class="bottom-ribbon">
        <div class="nav-inner">
            <button class="nav-item active" data-target="viewHome" data-sub="Operational Control Hub">
                <i class="fas fa-folder-tree"></i>Home
            </button>
            <button class="nav-item" data-target="viewInstitutional" data-sub="National Strategy Portals">
                <i class="fas fa-landmark"></i>Institutional
            </button>
            <button class="nav-item" data-target="viewConsulting" data-sub="Corporate Placement Advisory">
                <i class="fas fa-fingerprint"></i>Consulting
            </button>
            <button class="nav-item" data-target="viewProduct" data-sub="Proprietary Engineering Suites">
                <i class="fas fa-cubes-stacked"></i>Product
            </button>
        </div>
    </nav>
</div>

<!-- Configured Overlay Modal Form Component -->
<div class="modal-overlay" id="assetModalOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitleText">Inject Target Asset</h3>
            <button class="close-modal-trigger" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="formAssetId">
            <div class="form-group">
                <label>Corporate Entity Name *</label>
                <input type="text" id="formAttrName" placeholder="e.g., McKinsey &amp; Company">
            </div>
            <div class="form-group">
                <label>Ecosystem Domain *</label>
                <select id="formAttrType">
                    <option value="Consulting">Consulting &amp; Advisory</option>
                    <option value="Product">Product &amp; Tech Systems</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lahore Office Hub</label>
                <input type="text" id="formAttrLocation" placeholder="e.g., Gulberg III">
            </div>
            <div class="form-group">
                <label>Recruitment Suite URL *</label>
                <input type="url" id="formAttrUrl" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Corporate LinkedIn URL</label>
                <input type="url" id="formAttrLinkedin" placeholder="https://linkedin.com/company/...">
            </div>
            <div class="form-group">
                <label>Strategic Intent Thesis</label>
                <textarea id="formAttrDesc" rows="3" placeholder="Define product roadmap weight or alignment vector..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-ui btn-ui-danger" id="deleteAssetBtn" style="display: none;"><i class="fas fa-trash"></i> Purge</button>
            <button class="btn-ui btn-ui-secondary" id="cancelModalBtn">Cancel</button>
            <button class="btn-ui btn-ui-primary" id="saveAssetBtn">Commit</button>
        </div>
    </div>
</div>

<script>
    // ----- RAW IMMUTABLE CORE REPOSITORIES -----
    const INSTITUTIONAL_DATA = [
        { name: "FPSC Career Portal", desc: "Federal Strategy & Administration Channels", url: "https://www.fpsc.gov.pk", icon: "fa-gavel" },
        { name: "FPSC AD-Level Grid", desc: "Assistant Director Recruitment Consolidated Tracks", url: "https://www.fpsc.gov.pk", icon: "fa-user-tie" },
        { name: "FIA Systems Track", desc: "Federal Investigation Agency Command Portals", url: "https://fia.gov.pk/careers", icon: "fa-shield-halved" },
        { name: "NAB Frameworks", desc: "National Accountability Bureau Careers & Inquiries", url: "https://nab.gov.pk/jobs.asp", icon: "fa-building-shield" },
        { name: "State Bank of Pakistan (SBP)", desc: "Executive Policy Making & Fellowship Tracks", url: "https://www.sbp.org.pk/careers/status.asp", icon: "fa-building-columns" },
        { name: "NADRA Systems", desc: "Identity Infrastructure & Core Enterprise Product Roles", url: "https://www.nadra.gov.pk/careers", icon: "fa-id-card" }
    ];

    const DEFAULT_COMPANIES = [
        { id: 1, rank: 1, name: "PwC Pakistan (A.F. Ferguson & Co.)", type: "Consulting", location: "Gulberg V", description: "Market leader in complex corporate finance restructuring, high-stakes transaction advisory, risk frameworks, and systemic enterprise growth strategy.", url: "https://www.pwc.com.pk/en/about-us/offices.html", linkedin: "https://www.linkedin.com/company/pwc-pakistan" },
        { id: 2, rank: 2, name: "EY Ford Rhodes", type: "Consulting", location: "Gulberg II", description: "Top-tier operational turnarounds, structural market transactions, macro-level strategic planning models, and premium institutional business consulting.", url: "https://www.ey.com/en_gl/locations/pakistan", linkedin: "https://www.linkedin.com/company/ey" },
        { id: 3, rank: 3, name: "KPMG Taseer Hadi & Co.", type: "Consulting", location: "Gulberg II", description: "Specialized management consulting wings focusing heavily on institutional risk management frameworks, strategic evaluations, and structural merger advisory.", url: "https://kpmg.com/pk/en/home.html", linkedin: "https://www.linkedin.com/company/kpmg-pakistan" },
        { id: 4, rank: 4, name: "Yousuf Adil", type: "Consulting", location: "Gulberg III", description: "Premium corporate finance hub specializing in large-scale infrastructure capital projects, financial feasibility modeling, and performance analytics.", url: "https://yousufadil.com/careers/", linkedin: "https://www.linkedin.com/company/yousuf-adil" },
        { id: 5, rank: 5, name: "Abacus Consulting", type: "Consulting", location: "Egerton Road", description: "Largest domestic digital transformation strategy practice. Specializes in global enterprise target architecture, scaling metrics, and SAP strategy consulting.", url: "https://www.abacus-global.com/careers", linkedin: "https://www.linkedin.com/company/abacus-consulting" },
        { id: 6, rank: 1, name: "Motive (KeepTruckin)", type: "Product", location: "Gulberg II", description: "Global Silicon Valley flagship scaling AI-driven fleet infrastructure, fleet metrics SaaS, and advanced custom telematics systems with elite local PM tracks.", url: "https://gomotive.com/company/careers/", linkedin: "https://www.linkedin.com/company/gomotive" },
        { id: 7, rank: 2, name: "Educative.io", type: "Product", location: "Gulberg III", description: "Highly dynamic cloud B2B developer education SaaS platform managing real-time runtime engine interfaces, running complete engineering-to-product tracks locally.", url: "https://www.educative.io/careers", linkedin: "https://www.linkedin.com/company/educative-inc" },
        { id: 8, rank: 3, name: "NetSol Technologies", type: "Product", location: "Ring Road Hub", description: "Global asset financial computing giant. Owns proprietary 'NFS Ascent' infrastructure managing tier-1 global asset leasing configurations.", url: "https://netsoltech.com/careers", linkedin: "https://www.linkedin.com/company/netsol-technologies-inc-" },
        { id: 9, rank: 4, name: "Systems Limited", type: "Product", location: "DHA Phase 8", description: "Largest tech ecosystem engine in the country. Owns unique domestic banking core platforms, retail configurations, and custom ERP product layers.", url: "https://www.systemsltd.com/careers", linkedin: "https://www.linkedin.com/company/systemsltd" },
        { id: 10, rank: 5, name: "Arbisoft", type: "Product", location: "DHA Phase 8", description: "Premium agile product scaling infrastructure operating massive customized SaaS instances, international platforms, and high-throughput routing algorithms.", url: "https://arbisoft.com/careers/", linkedin: "https://www.linkedin.com/company/arbisoft" }
    ];

    let portfolio = [];
    let searchFilter = "";

    // DOM Links Mapping
    const homeGrid = document.getElementById('homeGridContainer');
    const consultGrid = document.getElementById('consultingGridContainer');
    const prodGrid = document.getElementById('productGridContainer');
    const instContainer = document.getElementById('institutionalContainer');
    const viewSubtitle = document.getElementById('viewSubtitle');
    const headerActionZone = document.getElementById('headerActionZone');
    
    // Form Mapping
    const modalOverlay = document.getElementById('assetModalOverlay');
    const assetIdInp = document.getElementById('formAssetId');
    const attrNameInp = document.getElementById('formAttrName');
    const attrTypeInp = document.getElementById('formAttrType');
    const attrLocInp = document.getElementById('formAttrLocation');
    const attrUrlInp = document.getElementById('formAttrUrl');
    const attrLnkInp = document.getElementById('formAttrLinkedin');
    const attrDescInp = document.getElementById('formAttrDesc');
    const deleteBtn = document.getElementById('deleteAssetBtn');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function verifyUrl(url) {
        if (!url) return '';
        let clean = url.trim();
        if (clean && !clean.startsWith('http')) {
            clean = 'https://' + clean;
        }
        return clean;
    }

    // Engine Framework Cache Hooks
    function initDatabase() {
        const cached = localStorage.getItem('farid_oppotrack_db');
        if(cached) {
            try { portfolio = JSON.parse(cached); } catch(e) { portfolio = [...DEFAULT_COMPANIES]; }
        } else {
            portfolio = [...DEFAULT_COMPANIES];
        }
        syncDataAndRender();
    }

    function syncDataAndRender() {
        localStorage.setItem('farid_oppotrack_db', JSON.stringify(portfolio));
        renderActiveViews();
    }

    // Navigation Context State Manager
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const currentTab = e.currentTarget;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            
            currentTab.classList.add('active');
            const targetViewId = currentTab.dataset.target;
            document.getElementById(targetViewId).classList.add('active');
            
            viewSubtitle.innerText = currentTab.dataset.sub;

            // Header actions switch validation
            if (targetViewId === 'viewHome') {
                headerActionZone.style.visibility = 'visible';
            } else {
                headerActionZone.style.visibility = 'hidden';
            }
        });
    });

    // Unified Views Factory
    function renderActiveViews() {
        // --- 1. VIEW HOME (MUTABLE DUAL COLUMN) ---
        const cleanQuery = searchFilter.trim().toLowerCase();
        const filteredHome = portfolio.filter(c => 
            !cleanQuery || 
            c.name.toLowerCase().includes(cleanQuery) || 
            (c.description && c.description.toLowerCase().includes(cleanQuery)) ||
            (c.location && c.location.toLowerCase().includes(cleanQuery))
        );

        if(filteredHome.length === 0) {
            homeGrid.innerHTML = `<div class="empty-view-state"><i class="fas fa-radar"></i>No records found matching lookup.</div>`;
        } else {
            homeGrid.innerHTML = filteredHome.map(comp => `
                <div class="matrix-card interactive" onclick="launchEditModal(${comp.id})">
                    <div>
                        <div class="card-top">
                            <span class="card-title">${escapeHtml(comp.name)}</span>
                            <span class="badge badge-${comp.type.toLowerCase()}">${comp.type}</span>
                        </div>
                        <div class="card-meta">
                            ${comp.rank ? `<span class="badge badge-rank"><i class="fas fa-crown"></i> Rank #${comp.rank}</span>` : ''}
                            ${comp.location ? `<span><i class="fas fa-location-dot"></i> ${escapeHtml(comp.location)}</span>` : ''}
                        </div>
                        <p class="card-desc">${escapeHtml(comp.description || 'No strategic narrative committed.')}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- 2. VIEW INSTITUTIONAL (READ-ONLY ROWS) ---
        instContainer.innerHTML = INSTITUTIONAL_DATA.map(inst => `
            <div class="inst-list-item">
                <div style="display: flex; align-items: center; gap: 14px;">
                    <div class="inst-icon"><i class="fas ${inst.icon}"></i></div>
                    <div class="inst-details">
                        <h4>${escapeHtml(inst.name)}</h4>
                        <p>${escapeHtml(inst.desc)}</p>
                    </div>
                </div>
                <a href="${verifyUrl(inst.url)}" target="_blank" rel="noopener noreferrer" class="link-anchor lnk-web"><i class="fas fa-arrow-up-right-from-square"></i> Open</a>
            </div>
        `).join('');

        // --- 3. VIEW CONSULTING (READ-ONLY) ---
        const consultants = portfolio.filter(c => c.type === 'Consulting');
        if(consultants.length === 0) {
            consultGrid.innerHTML = `<div class="empty-view-state"><i class="fas fa-folder-open"></i>No Advisory metrics logged.</div>`;
        } else {
            consultGrid.innerHTML = consultants.map(comp => generateReadOnlyCard(comp)).join('');
        }

        // --- 4. VIEW PRODUCT (READ-ONLY) ---
        const products = portfolio.filter(c => c.type === 'Product');
        if(products.length === 0) {
            prodGrid.innerHTML = `<div class="empty-view-state"><i class="fas fa-folder-open"></i>No Product suites logged.</div>`;
        } else {
            prodGrid.innerHTML = products.map(comp => generateReadOnlyCard(comp)).join('');
        }
    }

    function generateReadOnlyCard(comp) {
        const webLink = verifyUrl(comp.url);
        const lknLink = verifyUrl(comp.linkedin);
        return `
            <div class="matrix-card">
                <div>
                    <div class="card-top">
                        <span class="card-title">${escapeHtml(comp.name)}</span>
                    </div>
                    <div class="card-meta">
                        ${comp.rank ? `<span class="badge badge-rank"><i class="fas fa-crown"></i> Rank #${comp.rank}</span>` : ''}
                        ${comp.location ? `<span><i class="fas fa-location-dot"></i> ${escapeHtml(comp.location)}</span>` : ''}
                    </div>
                    <p class="card-desc">${escapeHtml(comp.description || 'No strategic narrative committed.')}</p>
                </div>
                <div class="action-row">
                    ${webLink ? `<a href="${webLink}" target="_blank" rel="noopener noreferrer" class="link-anchor lnk-web"><i class="fas fa-globe"></i> Web</a>` : ''}
                    ${lknLink ? `<a href="${lknLink}" target="_blank" rel="noopener noreferrer" class="link-anchor lnk-linkedin"><i class="fab fa-linkedin-in"></i> LinkedIn</a>` : ''}
                </div>
            </div>
        `;
    }

    // Modal Control Logic
    function clearForm() {
        assetIdInp.value = '';
        attrNameInp.value = '';
        attrLocInp.value = '';
        attrUrlInp.value = '';
        attrLnkInp.value = '';
        attrDescInp.value = '';
        attrTypeInp.value = 'Consulting';
    }

    document.getElementById('openAddModalBtn').addEventListener('click', () => {
        clearForm();
        document.getElementById('modalTitleText').innerText = "Inject Target Asset";
        deleteBtn.style.display = 'none';
        modalOverlay.classList.add('active');
    });

    window.launchEditModal = function(id) {
        const comp = portfolio.find(c => c.id === id);
        if(!comp) return;
        
        assetIdInp.value = comp.id;
        attrNameInp.value = comp.name || '';
        attrTypeInp.value = comp.type || 'Consulting';
        attrLocInp.value = comp.location || '';
        attrUrlInp.value = comp.url || '';
        attrLnkInp.value = comp.linkedin || '';
        attrDescInp.value = comp.description || '';

        document.getElementById('modalTitleText').innerText = "Modify Core Parameters";
        deleteBtn.style.display = 'inline-flex';
        modalOverlay.classList.add('active');
    };

    function hideModal() {
        modalOverlay.classList.remove('active');
        clearForm();
    }

    document.getElementById('closeModalBtn').addEventListener('click', hideModal);
    document.getElementById('cancelModalBtn').addEventListener('click', hideModal);

    // Commit Mutation Form Actions
    document.getElementById('saveAssetBtn').addEventListener('click', () => {
        const name = attrNameInp.value.trim();
        const url = attrUrlInp.value.trim();
        if(!name || !url) { alert("Core specifications missing."); return; }

        const id = assetIdInp.value;
        const assetData = {
            name,
            type: attrTypeInp.value,
            location: attrLocInp.value.trim(),
            url: verifyUrl(url),
            linkedin: verifyUrl(lknLink = attrLnkInp.value.trim()),
            description: attrDescInp.value.trim()
        };

        if(id) {
            // Update Existing Track
            const idx = portfolio.findIndex(c => c.id == id);
            if(idx !== -1) {
                portfolio[idx] = { ...portfolio[idx], ...assetData };
            }
        } else {
            // Append New Record
            assetData.id = Date.now();
            assetData.rank = null;
            portfolio.push(assetData);
        }

        hideModal();
        syncDataAndRender();
    });

    deleteBtn.addEventListener('click', () => {
        const id = assetIdInp.value;
        if(id && confirm("Purge entry entirely from engine tracking matrix?")) {
            portfolio = portfolio.filter(c => c.id != id);
            hideModal();
            syncDataAndRender();
        }
    });

    // Real-time Filtering Engine Hooks
    document.getElementById('homeSearchInput').addEventListener('input', (e) => {
        searchFilter = e.target.value;
        renderActiveViews();
    });

    // Boot Command
    initDatabase();
</script>
</body>
</html>
