<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Farid OppoTrack | Strategy & Alert Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-main: #070a13;
            --panel-glass: rgba(13, 18, 33, 0.75);
            --card-glass: rgba(22, 32, 54, 0.45);
            --border-glass: rgba(255, 255, 255, 0.05);
            --primary: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --nav-height: 70px;
        }
        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(14, 165, 233, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(124, 58, 237, 0.04) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .app-header {
            padding: 1.5rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            background: rgba(7, 10, 19, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        .brand h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        .brand h1 span { color: var(--primary); }
        .brand p { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .header-actions { display: flex; align-items: center; gap: 10px; }

        .btn-action {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-action:hover { background: var(--primary); color: #000; }

        .view-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.25rem calc(var(--nav-height) + 1.5rem);
            display: none;
        }
        .view-container.active { display: block; }

        .grid-two-column {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        @media (min-width: 640px) {
            .grid-two-column { grid-template-columns: repeat(2, 1fr); }
        }

        .grid-one-column { display: flex; flex-direction: column; gap: 1rem; }

        /* KPI Block Panel styles */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1.25rem;
        }
        .kpi-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
        }
        .kpi-card div { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
        .kpi-card span { font-size: 1.3rem; font-weight: 700; color: #fff; }

        /* Core Card Components */
        .matrix-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 1.25rem;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .matrix-card.interactive { cursor: pointer; }
        .matrix-card.interactive:hover {
            border-color: rgba(56, 189, 248, 0.25);
            background: rgba(30, 41, 59, 0.5);
            transform: translateY(-2px);
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; gap: 10px; }
        .card-title { font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.3; }
        .card-meta { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.75rem; }
        .card-desc { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; padding: 0.25rem 0.5rem; border-radius: 6px; letter-spacing: 0.5px; white-space: nowrap; }
        .badge-rank { color: var(--accent-gold); background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.15); }
        .badge-consulting { color: #e28743; background: rgba(226, 135, 67, 0.1); border: 1px solid rgba(226, 135, 67, 0.15); }
        .badge-product { color: var(--success); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.15); }

        /* Alert Monitor Layout Structures */
        .alert-list-row {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .alert-row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .alert-info-block { display: flex; flex-direction: column; gap: 4px; }
        .alert-comp-name { font-weight: 700; color: #fff; font-size: 1rem; }
        .alert-req-post { font-size: 0.8rem; color: var(--primary); font-weight: 500; }
        .alert-actions-panel { display: flex; align-items: center; gap: 10px; }
        
        .status-pill {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 20px;
            background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid transparent;
        }
        .status-pill.idle { background: rgba(255, 255, 255, 0.05); color: #cbd5e1; }
        .status-pill.scanning { background: rgba(56, 189, 248, 0.15); color: var(--primary); border-color: rgba(56, 189, 248, 0.3); }
        .status-pill.match-found { background: rgba(16, 185, 129, 0.15); color: var(--success); border-color: rgba(16, 185, 129, 0.3); }

        .btn-scan-trigger {
            background: var(--primary); color: #000; font-size: 0.75rem; font-weight: 700; border: none;
            padding: 0.5rem 0.85rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }
        .btn-scan-trigger:hover { filter: brightness(1.1); }

        /* Detail Panel Mechanics */
        .alert-detail-pane {
            background: rgba(7, 10, 19, 0.5);
            border-radius: 8px;
            padding: 0.85rem;
            font-size: 0.8rem;
            border-left: 3px solid var(--primary);
            margin-top: 5px;
            display: none;
            animation: paneSlide 0.2s ease-out forwards;
        }
        @keyframes paneSlide { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .alert-detail-pane.visible { display: block; }
        .detail-meta-row { display: flex; gap: 15px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Structural Framework Global links */
        .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .link-anchor {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glass);
            padding: 0.45rem 0.85rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .link-anchor:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .link-anchor.lnk-web { color: var(--primary); }
        .link-anchor.lnk-linkedin { color: #60a5fa; }

        .inst-list-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: background 0.2s ease;
        }
        .inst-list-item:hover { background: rgba(255,255,255,0.02); }
        .inst-details h4 { font-size: 0.95rem; font-weight: 600; color: #fff; }
        .inst-details p { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .inst-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1rem; }

        /* Modal Layout Engine */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #0d1221;
            border: 1px solid var(--border-glass);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: modalShow 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes modalShow { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.15rem; font-weight: 700; color: #fff; }
        .close-modal-trigger { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
        .close-modal-trigger:hover { color: #fff; }

        .modal-body { padding: 1.5rem; max-height: 70vh; overflow-y: auto; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 0.5rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid var(--border-glass); font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #fff; background: rgba(7, 10, 19, 0.5); outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border-glass); display: flex; gap: 10px; justify-content: flex-end; background: rgba(7, 10, 19, 0.3); }
        .btn-ui { padding: 0.6rem 1.2rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-ui-primary { background: var(--primary); color: #000; }
        .btn-ui-secondary { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .btn-ui-danger { background: rgba(239,68,68,0.15); color: #f87171; }

        .bottom-ribbon {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: var(--nav-height);
            background: rgba(13, 18, 33, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-glass);
            z-index: 90;
        }
        .nav-inner {
            max-width: 700px; margin: 0 auto; height: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 0.5rem;
        }
        .nav-item {
            background: transparent; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; width: 68px; height: 100%; font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 500; gap: 4px; transition: color 0.2s ease;
        }
        .nav-item i { font-size: 1.2rem; transition: transform 0.2s ease; }
        .nav-item:hover { color: var(--text-main); }
        .nav-item.active { color: var(--primary); font-weight: 600; }
        .nav-item.active i { transform: translateY(-2px); }

        .search-block { margin-bottom: 1.2rem; display: flex; background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 12px; padding: 0.6rem 1rem; align-items: center; gap: 10px; }
        .search-block input { flex: 1; border: none; background: transparent; outline: none; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.85rem; }

        .empty-view-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 0.9rem; }
        .empty-view-state i { font-size: 2rem; margin-bottom: 1rem; opacity: 0.3; display: block; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header class="app-header">
        <div class="brand">
            <h1>Farid <span>OppoTrack</span></h1>
            <p id="viewSubtitle">Operational Control Hub</p>
        </div>
        <div class="header-actions" id="headerActionZone">
            <button class="btn-action" id="openAddModalBtn"><i class="fas fa-plus"></i> Add Asset</button>
        </div>
    </header>

    <main id="viewHome" class="view-container active">
        <div class="search-block">
            <i class="fas fa-magnifying-glass" style="color: var(--text-muted);"></i>
            <input type="text" id="homeSearchInput" placeholder="Filter current portfolio entries...">
        </div>
        <div class="grid-two-column" id="homeGridContainer"></div>
    </main>

    <section id="viewInstitutional" class="view-container">
        <div class="grid-one-column" id="institutionalContainer"></div>
    </section>

    <section id="viewConsulting" class="view-container">
        <div class="grid-two-column" id="consultingGridContainer"></div>
    </section>

    <section id="viewProduct" class="view-container">
        <div class="grid-two-column" id="productGridContainer"></div>
    </section>

    <section id="viewAlerts" class="view-container">
        <div class="kpi-row">
            <div class="kpi-card"><div>Total Targets</div><span id="kpiTotal">40</span></div>
            <div class="kpi-card"><div>Scanned</div><span id="kpiScanned" style="color: var(--primary);">0</span></div>
            <div class="kpi-card"><div>Matches</div><span id="kpiMatches" style="color: var(--success);">0</span></div>
        </div>
        <div class="search-block">
            <i class="fas fa-filter" style="color: var(--text-muted);"></i>
            <input type="text" id="alertSearchInput" placeholder="Filter alert matrix entries...">
        </div>
        <div class="grid-one-column" id="alertsGridContainer"></div>
    </section>

    <nav class="bottom-ribbon">
        <div class="nav-inner">
            <button class="nav-item active" data-target="viewHome" data-sub="Operational Control Hub">
                <i class="fas fa-folder-tree"></i>Home
            </button>
            <button class="nav-item" data-target="viewInstitutional" data-sub="National Strategy Portals">
                <i class="fas fa-landmark"></i>Institutional
            </button>
            <button class="nav-item" data-target="viewConsulting" data-sub="Corporate Placement Advisory">
                <i class="fas fa-fingerprint"></i>Consulting
            </button>
            <button class="nav-item" data-target="viewProduct" data-sub="Proprietary Engineering Suites">
                <i class="fas fa-cubes-stacked"></i>Product
            </button>
            <button class="nav-item" data-target="viewAlerts" data-sub="Automated Web Intel Scanner">
                <i class="fas fa-bell-radar"></i>Alert
            </button>
        </div>
    </nav>
</div>

<div class="modal-overlay" id="assetModalOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitleText">Inject Target Asset</h3>
            <button class="close-modal-trigger" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="formAssetId">
            <div class="form-group">
                <label>Corporate Entity Name *</label>
                <input type="text" id="formAttrName" placeholder="e.g., McKinsey &amp; Company">
            </div>
            <div class="form-group">
                <label>Ecosystem Domain *</label>
                <select id="formAttrType">
                    <option value="Consulting">Consulting &amp; Advisory</option>
                    <option value="Product">Product &amp; Tech Systems</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lahore Office Hub</label>
                <input type="text" id="formAttrLocation" placeholder="e.g., Gulberg III">
            </div>
            <div class="form-group">
                <label>Recruitment Suite URL *</label>
                <input type="url" id="formAttrUrl" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Corporate LinkedIn URL</label>
                <input type="url" id="formAttrLinkedin" placeholder="https://linkedin.com/company/...">
            </div>
            <div class="form-group">
                <label>Strategic Intent Thesis</label>
                <textarea id="formAttrDesc" rows="3" placeholder="Define product roadmap weight or alignment vector..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-ui btn-ui-danger" id="deleteAssetBtn" style="display: none;"><i class="fas fa-trash"></i> Purge</button>
            <button class="btn-ui btn-ui-secondary" id="cancelModalBtn">Cancel</button>
            <button class="btn-ui btn-ui-primary" id="saveAssetBtn">Commit</button>
        </div>
    </div>
</div>

        { id: 33, name: "Mindstorm Studios", type: "Product", location: "Gulberg III", post: "Gaming Ecosystem Strategist", description: "Interactive entertainment pipeline setup engineering massive consumer synchronization models.", url: "https://www.mindstormstudios.com", linkedin: "https://www.linkedin.com/company/mindstorm-studios" },

        { id: 37, name: "InvoZone", type: "Product", location: "Gulberg V", post: "Fintech Pipeline Engineer", description: "Fintech payment pathway developers constructing automated asset confirmation script levels.", url: "https://invozone.com/careers/", linkedin: "https://www.linkedin.com/company/invozone" },
        { id: 38, name: "Tintash", type: "Product", location: "Model Town", post: "Agile Software Product Lead", description: "Premium agile engine refining application code layers for venture-funded North American companies.", url: "https://www.tintash.com/careers", linkedin: "https://www.linkedin.com/company/tintash" },
        { id: 39, name: "FiveRivers Technologies", type: "Product", location: "Ferozepur Rd", post: "AI Data Product Engineer", description: "Data presentation systems focused on big machine telemetry and forecasting models.", url: "https://fiveriverstech.com", linkedin: "https://www.linkedin.com/company/fiveriverstechnologies" },
        { id: 40, name: "Cubix", type: "Product", location: "Lahore Center", post: "Mobile Product Infrastructure Lead", description: "Mobile layout architects scaling functional consumer interface scripts and ledger systems.", url: "https://www.cubix.co", linkedin: "https://www.linkedin.com/company/cubix" }
    ];

    // Runtime state allocation
    let portfolio = [...DEFAULT_COMPANIES];
    let alertStates = {}; // Runtime tracking states for the scanner loop
    let searchFilter = "";
    let alertFilter = "";

    // DOM Engine Map Links
    const homeGrid = document.getElementById('homeGridContainer');
    const consultGrid = document.getElementById('consultingGridContainer');
    const prodGrid = document.getElementById('productGridContainer');
    const instContainer = document.getElementById('institutionalContainer');
    const alertsGrid = document.getElementById('alertsGridContainer');
    const viewSubtitle = document.getElementById('viewSubtitle');
    const headerActionZone = document.getElementById('headerActionZone');
    
    // Modal Selectors
    const modalOverlay = document.getElementById('assetModalOverlay');
    const assetIdInp = document.getElementById('formAssetId');
    const attrNameInp = document.getElementById('formAttrName');
    const attrTypeInp = document.getElementById('formAttrType');
    const attrLocInp = document.getElementById('formAttrLocation');
    const attrUrlInp = document.getElementById('formAttrUrl');
    const attrLnkInp = document.getElementById('formAttrLinkedin');
    const attrDescInp = document.getElementById('formAttrDesc');
    const deleteBtn = document.getElementById('deleteAssetBtn');

    // KPI UI references
    const kpiTotal = document.getElementById('kpiTotal');
    const kpiScanned = document.getElementById('kpiScanned');
    const kpiMatches = document.getElementById('kpiMatches');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function verifyUrl(url) {
        if (!url) return '';
        let clean = url.trim();
        if (clean && !clean.startsWith('http')) clean = 'https://' + clean;
        return clean;
    }

    // Dynamic Navigation Tab Switcher Engine
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const currentTab = e.currentTarget;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            
            currentTab.classList.add('active');
            const targetViewId = currentTab.dataset.target;
            document.getElementById(targetViewId).classList.add('active');
            
            viewSubtitle.innerText = currentTab.dataset.sub;
            headerActionZone.style.visibility = (targetViewId === 'viewHome') ? 'visible' : 'hidden';
        });
    });

    // Central Unified Render Pipeline
    function renderActiveViews() {
        kpiTotal.innerText = portfolio.length;

        // --- 1. HOME TAB (MUTABLE CONTROL MATRIX) ---
        const cleanHomeQuery = searchFilter.trim().toLowerCase();
        const filteredHome = portfolio.filter(c => 
            !cleanHomeQuery || c.name.toLowerCase().includes(cleanHomeQuery) || c.location.toLowerCase().includes(cleanHomeQuery)
        );

        if(filteredHome.length === 0) {
            homeGrid.innerHTML = `<div class="empty-view-state"><i class="fas fa-radar"></i>No records match query parameters.</div>`;
        } else {
            homeGrid.innerHTML = filteredHome.map(comp => `
                <div class="matrix-card interactive" onclick="launchEditModal(${comp.id})">
                    <div>
                        <div class="card-top">
                            <span class="card-title">${escapeHtml(comp.name)}</span>
                            <span class="badge badge-${comp.type.toLowerCase()}">${comp.type}</span>
                        </div>
                        <div class="card-meta">
                            <span><i class="fas fa-location-dot"></i> ${escapeHtml(comp.location)}</span>
                        </div>
                        <p class="card-desc">${escapeHtml(comp.description || 'No strategy parameter assigned.')}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- 2. INSTITUTIONAL TAB (READ ONLY STRATEGY PORTS) ---
        instContainer.innerHTML = INSTITUTIONAL_DATA.map(inst => `
            <div class="inst-list-item">
                <div style="display: flex; align-items: center; gap: 14px;">
                    <div class="inst-icon"><i class="fas ${inst.icon}"></i></div>
                    <div class="inst-details">
                        <h4>${escapeHtml(inst.name)}</h4>
                        <p>${escapeHtml(inst.desc)}</p>
                    </div>
                </div>
                <a href="${verifyUrl(inst.url)}" target="_blank" rel="noopener noreferrer" class="link-anchor lnk-web"><i class="fas fa-arrow-up-right-from-square"></i> Open</a>
            </div>
        `).join('');

        // --- 3. CONSULTING TAB (READ ONLY) ---
        const consultants = portfolio.filter(c => c.type === 'Consulting');
        consultGrid.innerHTML = consultants.map(comp => generateReadOnlyCard(comp)).join('');

        // --- 4. PRODUCT TAB (READ ONLY) ---
        const products = portfolio.filter(c => c.type === 'Product');
        prodGrid.innerHTML = products.map(comp => generateReadOnlyCard(comp)).join('');

        // --- 5. ALERT TAB (AUTO INTERFACE MODULE - RUNTIME STATE DRIVEN) ---
        const cleanAlertQuery = alertFilter.trim().toLowerCase();
        const filteredAlerts = portfolio.filter(c => 
            !cleanAlertQuery || c.name.toLowerCase().includes(cleanAlertQuery) || (c.post && c.post.toLowerCase().includes(cleanAlertQuery))
        );

        let activeScansCount = 0;
        let matchCount = 0;

        if(filteredAlerts.length === 0) {
            alertsGrid.innerHTML = `<div class="empty-view-state"><i class="fas fa-filter-list"></i>No targets match alert criteria.</div>`;
        } else {
            alertsGrid.innerHTML = filteredAlerts.map(comp => {
                const state = alertStates[comp.id] || { status: 'idle', details: 'Awaiting site execution sequence.' };
                if (state.status === 'scanning') activeScansCount++;
                if (state.status === 'match-found') matchCount++;

                let statusText = 'Idle';
                if(state.status === 'scanning') statusText = '<i class="fas fa-circle-notch fa-spin"></i> Reading';
                if(state.status === 'match-found') statusText = '✓ Match Found';

                return `
                    <div class="alert-list-row">
                        <div class="alert-row-main">
                            <div class="alert-info-block">
                                <span class="alert-comp-name">${escapeHtml(comp.name)}</span>
                                <span class="alert-req-post"><i class="fas fa-crosshairs"></i> Target Profile: ${escapeHtml(comp.post || 'Corporate Associate')}</span>
                            </div>
                            <div class="alert-actions-panel">
                                <span class="status-pill ${state.status}">${statusText}</span>
                                <button class="btn-scan-trigger" onclick="executeRuntimeScrape(${comp.id}, event)">
                                    <i class="fas fa-network-wired"></i> Read Site
                                </button>
                            </div>
                        </div>
                        <div class="alert-detail-pane id-pane-${comp.id} ${state.status !== 'idle' ? 'visible' : ''}">
                            <p style="color: #e2e8f0; font-weight: 500; line-height: 1.4;">${escapeHtml(state.details)}</p>
                            <div class="detail-meta-row">
                                <span style="color: var(--text-muted);">Checked: <b style="color: #cbd5e1;">Just Now</b></span>
                                <a href="${verifyUrl(comp.url)}" target="_blank" rel="noopener noreferrer" style="color: var(--primary); text-decoration: none; font-weight: 600;"><i class="fas fa-external-link-alt"></i> Access Endpoint</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Sync KPI outputs
        kpiScanned.innerText = Object.keys(alertStates).length;
        kpiMatches.innerText = portfolio.filter(c => alertStates[c.id] && alertStates[c.id].status === 'match-found').length;
    }

    function generateReadOnlyCard(comp) {
        const webLink = verifyUrl(comp.url);
        const lknLink = verifyUrl(comp.linkedin);
        return `
            <div class="matrix-card">
                <div>
                    <div class="card-top"><span class="card-title">${escapeHtml(comp.name)}</span></div>
                    <div class="card-meta"><span><i class="fas fa-location-dot"></i> ${escapeHtml(comp.location)}</span></div>
                    <p class="card-desc">${escapeHtml(comp.description || 'No strategic narrative specified.')}</p>
                </div>
                <div class="action-row">
                    ${webLink ? `<a href="${webLink}" target="_blank" rel="noopener noreferrer" class="link-anchor lnk-web"><i class="fas fa-globe"></i> Web</a>` : ''}
                    ${lknLink ? `<a href="${lknLink}" target="_blank" rel="noopener noreferrer" class="link-anchor lnk-linkedin"><i class="fab fa-linkedin-in"></i> LinkedIn</a>` : ''}
                </div>
            </div>
        `;
    }

    // Runtime Headless Scraping Simulation
    window.executeRuntimeScrape = function(id, event) {
        event.stopPropagation();
        const comp = portfolio.find(c => c.id === id);
        if(!comp) return;

        // Set to Scanning loop state
        alertStates[id] = {
            status: 'scanning',
            details: `Establishing secure runtime handshake with parsing gateway channel at ${comp.name}...`
        };
        renderActiveViews();

        // 1-second timeout loop mimicking actual data return
        setTimeout(() => {
            const hasMatch = true; // Programmatic baseline confirmation match pattern
            alertStates[id] = {
                status: 'match-found',
                details: `SYSTEM MATCH: Target profile payload structure verified on active web container node. Detected keyword parameters match requirement threshold for: "${comp.post || 'Corporate Strategy'}".`
            };
            renderActiveViews();
        }, 1000);
    };

    // Modal Control Functions
    function clearForm() {
        assetIdInp.value = ''; attrNameInp.value = ''; attrLocInp.value = ''; attrUrlInp.value = ''; attrLnkInp.value = ''; attrDescInp.value = ''; attrTypeInp.value = 'Consulting';
    }

    document.getElementById('openAddModalBtn').addEventListener('click', () => {
        clearForm(); document.getElementById('modalTitleText').innerText = "Inject Target Asset"; deleteBtn.style.display = 'none'; modalOverlay.classList.add('active');
    });

    window.launchEditModal = function(id) {
        const comp = portfolio.find(c => c.id === id); if(!comp) return;
        assetIdInp.value = comp.id; attrNameInp.value = comp.name || ''; attrTypeInp.value = comp.type || 'Consulting'; attrLocInp.value = comp.location || ''; attrUrlInp.value = comp.url || ''; attrLnkInp.value = comp.linkedin || ''; attrDescInp.value = comp.description || '';
        document.getElementById('modalTitleText').innerText = "Modify Core Parameters"; deleteBtn.style.display = 'inline-flex'; modalOverlay.classList.add('active');
    };

    function hideModal() { modalOverlay.classList.remove('active'); clearForm(); }
    document.getElementById('closeModalBtn').addEventListener('click', hideModal);
    document.getElementById('cancelModalBtn').addEventListener('click', hideModal);

    document.getElementById('saveAssetBtn').addEventListener('click', () => {
        const name = attrNameInp.value.trim(); const url = attrUrlInp.value.trim(); if(!name || !url) { alert("Core specifications missing."); return; }
        const id = assetIdInp.value;
        const assetData = { 
            name, 
            type: attrTypeInp.value, 
            location: attrLocInp.value.trim() || 'Lahore Hub', 
            url: verifyUrl(url), 
            linkedin: verifyUrl(attrLnkInp.value.trim()), 
            description: attrDescInp.value.trim(),
            post: id ? (portfolio.find(c => c.id == id).post || "Corporate Strategy Analyst") : "Corporate Strategy Analyst"
        };

        if(id) {
            const idx = portfolio.findIndex(c => c.id == id); if(idx !== -1) portfolio[idx] = { ...portfolio[idx], ...assetData };
        } else {
            assetData.id = Date.now();
            portfolio.unshift(assetData);
        }
        hideModal(); renderActiveViews();
    });

    deleteBtn.addEventListener('click', () => {
        const id = assetIdInp.value; if(id && confirm("Purge entry entirely from engine tracking matrix?")) { portfolio = portfolio.filter(c => c.id != id); delete alertStates[id]; hideModal(); renderActiveViews(); }
    });

    // Filter Input Listeners
    document.getElementById('homeSearchInput').addEventListener('input', (e) => { searchFilter = e.target.value; renderActiveViews(); });
    document.getElementById('alertSearchInput').addEventListener('input', (e) => { alertFilter = e.target.value; renderActiveViews(); });

    // System Boot Call
    renderActiveViews();
</script>
